name: Set up build JDK
description: Installs the shared Temurin JDK and Maven cache used by every workflow.

inputs:
  java-version:
    description: JDK version to install.
    required: false
    default: '17'

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
        cache: maven
