name: Bulk texture equivalence tests

on:
  pull_request:
    paths:
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/BulkTexturePreprocessor.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/ReferenceTexturePreprocessor.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/BulkTexturePreprocessorTest.java'
      - '.github/workflows/bulk-texture-tests.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  equivalence:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: ./.github/actions/setup-build-jdk
      - name: Run randomized reference-equivalence suite
        shell: bash
        run: >-
          mvn --batch-mode --no-transfer-progress
          -pl preflight-cli -am
          -Dtest=BulkTexturePreprocessorTest,ReferenceTexturePreprocessorTest
          -Dsurefire.failIfNoSpecifiedTests=false
          test
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bulk-texture-${{ matrix.os }}
          path: '**/target/surefire-reports/**'
          if-no-files-found: ignore
