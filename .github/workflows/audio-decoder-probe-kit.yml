name: Unified startup contract probe kit

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/audio-decoder-probe-kit.yml'
      - 'probe-kits/audio-decoder/**'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/AdapterProbeTransformer.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/AdapterRuntime.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/BytecodeShapeReport.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/AudioDecoderSignatureReport.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/SoundLoaderContractReport.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/CodeLoaderSignatureReport.java'
      - 'preflight-agent/src/test/java/dev/starsector/preflight/agent/BytecodeShapeReportTest.java'
      - 'preflight-agent/src/test/java/dev/starsector/preflight/agent/AudioDecoderSignatureReportTest.java'
      - 'preflight-agent/src/test/java/dev/starsector/preflight/agent/SoundLoaderContractReportTest.java'
      - 'preflight-agent/src/test/java/dev/starsector/preflight/agent/CodeLoaderSignatureReportTest.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/AgentInjection.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/CommandLine.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/AgentInjectionTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/CommandLineAdapterTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/AdapterAgentIT.java'
      - 'preflight-agent/pom.xml'
      - 'preflight-cli/pom.xml'
      - 'pom.xml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/audio-decoder-probe-kit.yml'
      - 'probe-kits/audio-decoder/**'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/AdapterProbeTransformer.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/AdapterRuntime.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/BytecodeShapeReport.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/AudioDecoderSignatureReport.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/SoundLoaderContractReport.java'
      - 'preflight-agent/src/main/java/dev/starsector/preflight/agent/CodeLoaderSignatureReport.java'
      - 'preflight-agent/src/test/java/dev/starsector/preflight/agent/BytecodeShapeReportTest.java'
      - 'preflight-agent/src/test/java/dev/starsector/preflight/agent/AudioDecoderSignatureReportTest.java'
      - 'preflight-agent/src/test/java/dev/starsector/preflight/agent/SoundLoaderContractReportTest.java'
      - 'preflight-agent/src/test/java/dev/starsector/preflight/agent/CodeLoaderSignatureReportTest.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/AgentInjection.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/CommandLine.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/AgentInjectionTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/CommandLineAdapterTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/AdapterAgentIT.java'
      - 'preflight-agent/pom.xml'
      - 'preflight-cli/pom.xml'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-kit:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      KIT_NAME: starsector-preflight-startup-contract-probe-kit-macos
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: ./.github/actions/setup-build-jdk
      - name: Verify macOS runner from a home-directory working folder
        shell: bash
        run: bash probe-kits/audio-decoder/test-macos-runner.sh
      - name: Verify packaged unified probe path
        run: >-
          mvn --batch-mode --no-transfer-progress
          -pl preflight-agent,preflight-cli -am
          -Dtest=BytecodeShapeReportTest,AudioDecoderSignatureReportTest,SoundLoaderContractReportTest,CodeLoaderSignatureReportTest,AgentOptionsTest,AgentInjectionTest,CommandLineAdapterTest
          -Dit.test=AdapterAgentIT
          -Dsurefire.failIfNoSpecifiedTests=false
          verify
      - name: Assemble macOS kit
        shell: bash
        run: |
          set -euo pipefail
          ROOT="dist/$KIT_NAME"
          mkdir -p "$ROOT"
          cp preflight-cli/target/preflight.jar "$ROOT/preflight.jar"
          cp probe-kits/audio-decoder/README.txt "$ROOT/README.txt"
          cp probe-kits/audio-decoder/run-startup-contract-probe-macos.command "$ROOT/"
          cp probe-kits/audio-decoder/setup-project-checkout-macos.command "$ROOT/"
          printf '%s\n' "$SOURCE_SHA" > "$ROOT/SOURCE_COMMIT.txt"
          chmod +x "$ROOT"/*.command
          (
            cd "$ROOT"
            sha256sum \
              preflight.jar \
              README.txt \
              run-startup-contract-probe-macos.command \
              setup-project-checkout-macos.command \
              SOURCE_COMMIT.txt \
              > CHECKSUMS.sha256
          )
          (
            cd dist
            zip -q -r "$KIT_NAME.zip" "$KIT_NAME"
          )
      - name: Upload self-contained kit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: starsector-preflight-startup-contract-probe-kit-macos
          path: dist/starsector-preflight-startup-contract-probe-kit-macos.zip
          if-no-files-found: error
          retention-days: 14
