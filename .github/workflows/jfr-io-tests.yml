name: JFR I/O attribution tests

on:
  pull_request:
    paths:
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/IoTraceAttribution.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/ImageReadStackAttribution.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/PreflightCli.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/IoTraceAttributionTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/ImageReadStackAttributionTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/IoTraceJfrIntegrationTest.java'
      - 'preflight-cli/src/test/java/com/fs/starfarer/SyntheticImageReader.java'
      - '.github/workflows/jfr-io-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run JFR I/O and image stack tests
        shell: bash
        run: |
          set +e
          mvn -q -pl preflight-cli -am test \
            -Dtest=IoTraceAttributionTest,ImageReadStackAttributionTest,IoTraceJfrIntegrationTest \
            -Dsurefire.failIfNoSpecifiedTests=false > jfr-io-maven.log 2>&1
          status=$?
          find . -path '*/target/surefire-reports/*.txt' -type f -print -exec cat {} \; >> jfr-io-maven.log
          tail -n 240 jfr-io-maven.log
          exit "$status"
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jfr-io-${{ matrix.os }}
          path: |
            jfr-io-maven.log
            **/target/surefire-reports/*
          if-no-files-found: warn
          retention-days: 7
