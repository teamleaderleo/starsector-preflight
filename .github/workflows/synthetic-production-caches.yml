name: Synthetic production cache tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tiny:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run tiny production-cache workload
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            -pl preflight-synthetic-startup -am \
            -Dtest=SyntheticWavePreparedAudioTest,SyntheticProductionCacheCrossProcessTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test > synthetic-production-caches-tiny.log 2>&1
          status=$?
          cat synthetic-production-caches-tiny.log
          exit $status
      - name: Upload tiny logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-production-caches-tiny-${{ matrix.os }}
          path: synthetic-production-caches-tiny.log
          if-no-files-found: error

  medium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run medium production-cache workload
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            -pl preflight-synthetic-startup -am \
            -Dpreflight.synthetic.medium=true \
            -Dtest=SyntheticProductionCacheCrossProcessTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test > synthetic-production-caches-medium.log 2>&1
          status=$?
          cat synthetic-production-caches-medium.log
          exit $status
      - name: Upload medium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-production-caches-medium-ubuntu
          path: synthetic-production-caches-medium.log
          if-no-files-found: error
