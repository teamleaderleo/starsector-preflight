name: PR 132 diagnostic verify

on:
  push:
    branches:
      - repair/prepared-pixel-lifecycle-129-130-128

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-jdk
      - name: Run verify and retain diagnostics
        id: verify
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress verify > verify.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pr132-verify-diagnostics
          if-no-files-found: error
          path: |
            verify.log
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
      - name: Preserve verify result
        shell: bash
        run: exit "${{ steps.verify.outputs.status }}"
