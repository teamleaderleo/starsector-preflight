name: Lookup equivalence tests

on:
  pull_request:
    paths:
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/LookupEquivalence.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/BenchmarkCommand.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/PreflightCli.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/LookupEquivalenceTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/BenchmarkCommandTest.java'
      - '.github/workflows/lookup-equivalence-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-build-jdk
      - name: Run lookup equivalence tests
        shell: bash
        run: |
          set +e
          mvn -q -pl preflight-cli -am test \
            -Dtest=LookupEquivalenceTest,BenchmarkCommandTest \
            -Dsurefire.failIfNoSpecifiedTests=false > lookup-equivalence-maven.log 2>&1
          status=$?
          find . -path '*/target/surefire-reports/*.txt' -type f -print -exec cat {} \; >> lookup-equivalence-maven.log
          tail -n 180 lookup-equivalence-maven.log
          exit "$status"
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lookup-equivalence-${{ matrix.os }}
          path: |
            lookup-equivalence-maven.log
            **/target/surefire-reports/*
          if-no-files-found: warn
          retention-days: 7
