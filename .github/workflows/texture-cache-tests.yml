name: Texture cache tests

on:
  pull_request:
    paths:
      - 'preflight-core/**'
      - 'preflight-cli/**'
      - '.github/workflows/texture-cache-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'preflight-core/**'
      - 'preflight-cli/**'
      - '.github/workflows/texture-cache-tests.yml'

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile and package
        run: mvn --batch-mode --no-transfer-progress -DskipTests package

  focused:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: manifest-format
            module: preflight-core
            tests: TextureManifestIOTest
          - name: manifest-validator
            module: preflight-core
            tests: TextureManifestValidatorTest
          - name: batch-builder
            module: preflight-cli
            tests: TextureBatchBuilderTest,TextureParallelHashingTest
          - name: batch-cli
            module: preflight-cli
            tests: TextureBatchCommandTest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run focused suite
        run: >-
          mvn --batch-mode --no-transfer-progress
          -pl ${{ matrix.module }} -am
          -Dtest=${{ matrix.tests }}
          -Dsurefire.failIfNoSpecifiedTests=false
          test

  real-profile-preparation-contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run macOS layout, filesystem identity, and preparation report tests
        shell: bash
        run: >-
          mvn --batch-mode --no-transfer-progress
          -pl preflight-cli -am
          -Dtest=ResourceIndexBuilderTest,LookupEquivalenceTest,PrepareCommandTest,StarsectorRunLogEvidenceTest
          -Dsurefire.failIfNoSpecifiedTests=false
          test
