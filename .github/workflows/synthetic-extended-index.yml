name: Synthetic extended index tests

on:
  push:
    branches: [main]
    paths:
      - 'preflight-synthetic-startup/src/main/java/dev/starsector/preflight/synthetic/SyntheticExtended*.java'
      - 'preflight-synthetic-startup/src/test/java/dev/starsector/preflight/synthetic/SyntheticExtended*.java'
      - 'preflight-synthetic-startup/pom.xml'
      - 'pom.xml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'preflight-synthetic-startup/src/main/java/dev/starsector/preflight/synthetic/SyntheticExtended*.java'
      - 'preflight-synthetic-startup/src/test/java/dev/starsector/preflight/synthetic/SyntheticExtended*.java'
      - 'preflight-synthetic-startup/pom.xml'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tiny:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-build-jdk
      - name: Run tiny extended provider-index tests
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            -pl preflight-synthetic-startup -am \
            -Dtest=SyntheticExtendedProfileTest,SyntheticExtendedResourceIndexTest,SyntheticExtendedIndexCrossProcessTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test > synthetic-extended-index-tiny.log 2>&1
          status=$?
          cat synthetic-extended-index-tiny.log
          exit $status
      - name: Upload tiny logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: synthetic-extended-index-tiny-${{ matrix.os }}
          path: synthetic-extended-index-tiny.log
          if-no-files-found: error
          retention-days: 7

  medium:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-build-jdk
      - name: Run medium extended provider-index tests
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            -pl preflight-synthetic-startup -am \
            -Dpreflight.synthetic.medium=true \
            -Dtest=SyntheticExtendedMediumProfileTest,SyntheticExtendedIndexCrossProcessTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test > synthetic-extended-index-medium.log 2>&1
          status=$?
          cat synthetic-extended-index-medium.log
          exit $status
      - name: Upload medium logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: synthetic-extended-index-medium-ubuntu
          path: synthetic-extended-index-medium.log
          if-no-files-found: error
          retention-days: 7
