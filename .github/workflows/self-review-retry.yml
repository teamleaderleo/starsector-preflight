name: Self-review retry

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply maintainer review fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def once(text, old, new, label):
              if text.count(old) != 1:
                  raise SystemExit(f"{label}: found {text.count(old)} matches")
              return text.replace(old, new, 1)

          p = Path('preflight-agent/src/main/java/dev/starsector/preflight/agent/SoundLoaderContractReport.java')
          s = p.read_text()
          replacements = [
              ('        root.put("callLimitPerMethod", CALL_LIMIT);\n        root.put("tryCatchLimitPerMethod", TRY_CATCH_LIMIT);',
               '        root.put("callLimitPerMethod", CALL_LIMIT);\n        root.put("sameClassCallLimitPerMethod", CALL_LIMIT);\n        root.put("constructorCallLimitPerMethod", CALL_LIMIT);\n        root.put("tryCatchLimitPerMethod", TRY_CATCH_LIMIT);', 'root limits'),
              ('        boolean callsTruncated = false;\n        boolean stringsTruncated = false;',
               '        boolean callsTruncated = false;\n        boolean sameClassCallsTruncated = false;\n        boolean constructorCallsTruncated = false;\n        boolean stringsTruncated = false;', 'truncation state'),
              ('                if (owner.equals(call.owner)) sameClassCalls.putIfAbsent(key, edge);\n                if (call.name.equals("<init>")) constructors.putIfAbsent(key, edge);',
               '                if (owner.equals(call.owner)) {\n                    if (sameClassCalls.size() < CALL_LIMIT || sameClassCalls.containsKey(key)) {\n                        sameClassCalls.putIfAbsent(key, edge);\n                    } else {\n                        sameClassCallsTruncated = true;\n                    }\n                }\n                if (call.name.equals("<init>")) {\n                    if (constructors.size() < CALL_LIMIT || constructors.containsKey(key)) {\n                        constructors.putIfAbsent(key, edge);\n                    } else {\n                        constructorCallsTruncated = true;\n                    }\n                }', 'bounded edges'),
              ('                fieldsTruncated,\n                callsTruncated,\n                tryCatches.truncated(),',
               '                fieldsTruncated,\n                callsTruncated,\n                sameClassCallsTruncated,\n                constructorCallsTruncated,\n                tryCatches.truncated(),', 'constructor args'),
              ('                Frame<BasicValue> frame = index >= 0 && index < frames.length ? frames[index] : null;\n                points.add(new FlowPoint(\n                        index,\n                        instruction.getOpcode(),\n                        flowKind(instruction),\n                        flowTarget(instruction),\n                        frameValues(frame, true),\n                        frameValues(frame, false)));',
               '                Frame<BasicValue> frame = index >= 0 && index < frames.length ? frames[index] : null;\n                FrameValues locals = frameValues(frame, true);\n                FrameValues stack = frameValues(frame, false);\n                points.add(new FlowPoint(\n                        index,\n                        instruction.getOpcode(),\n                        flowKind(instruction),\n                        flowTarget(instruction),\n                        locals.values(),\n                        locals.truncated(),\n                        stack.values(),\n                        stack.truncated()));', 'flow frame construction'),
              ('    private static List<String> frameValues(Frame<BasicValue> frame, boolean locals) {\n        if (frame == null) return List.of();\n        int count = locals ? frame.getLocals() : frame.getStackSize();\n        int retained = Math.min(count, FRAME_VALUE_LIMIT);\n        List<String> result = new ArrayList<>(retained);\n        for (int i = 0; i < retained; i++) {\n            BasicValue value = locals ? frame.getLocal(i) : frame.getStack(i);\n            result.add(frameValue(value));\n        }\n        return List.copyOf(result);\n    }',
               '    private static FrameValues frameValues(Frame<BasicValue> frame, boolean locals) {\n        if (frame == null) return new FrameValues(List.of(), false);\n        int count = locals ? frame.getLocals() : frame.getStackSize();\n        int retained = Math.min(count, FRAME_VALUE_LIMIT);\n        List<String> result = new ArrayList<>(retained);\n        for (int i = 0; i < retained; i++) {\n            BasicValue value = locals ? frame.getLocal(i) : frame.getStack(i);\n            result.add(frameValue(value));\n        }\n        return new FrameValues(List.copyOf(result), count > retained);\n    }', 'frame values'),
              ('            boolean fieldAccessesTruncated,\n            boolean callsTruncated,\n            boolean tryCatchRegionsTruncated,',
               '            boolean fieldAccessesTruncated,\n            boolean callsTruncated,\n            boolean sameClassCallsTruncated,\n            boolean constructorCallsTruncated,\n            boolean tryCatchRegionsTruncated,', 'record fields'),
              ('            values.put("fieldAccessesTruncated", fieldAccessesTruncated);\n            values.put("callsTruncated", callsTruncated);\n            values.put("tryCatchRegionsTruncated", tryCatchRegionsTruncated);',
               '            values.put("fieldAccessesTruncated", fieldAccessesTruncated);\n            values.put("callsTruncated", callsTruncated);\n            values.put("sameClassCallsTruncated", sameClassCallsTruncated);\n            values.put("constructorCallsTruncated", constructorCallsTruncated);\n            values.put("tryCatchRegionsTruncated", tryCatchRegionsTruncated);', 'record json'),
              ('            String target,\n            List<String> locals,\n            List<String> stack) {',
               '            String target,\n            List<String> locals,\n            boolean localsTruncated,\n            List<String> stack,\n            boolean stackTruncated) {', 'flow fields'),
              ('            values.put("target", target.isBlank() ? null : target);\n            values.put("locals", locals);\n            values.put("stack", stack);',
               '            values.put("target", target.isBlank() ? null : target);\n            values.put("locals", locals);\n            values.put("localsTruncated", localsTruncated);\n            values.put("stack", stack);\n            values.put("stackTruncated", stackTruncated);', 'flow json'),
              ('    private record FlowResult(List<FlowPoint> points, String error, boolean truncated) {\n    }\n\n    private record SourceSuffix(String value, boolean truncated) {',
               '    private record FlowResult(List<FlowPoint> points, String error, boolean truncated) {\n    }\n\n    private record FrameValues(List<String> values, boolean truncated) {\n    }\n\n    private record SourceSuffix(String value, boolean truncated) {', 'frame record'),
          ]
          for old, new, label in replacements:
              s = once(s, old, new, label)
          p.write_text(s)

          p = Path('preflight-agent/src/test/java/dev/starsector/preflight/agent/SoundLoaderContractReportTest.java')
          s = p.read_text()
          s = once(s,
              'import org.junit.jupiter.api.Test;\nimport org.junit.jupiter.api.io.TempDir;',
              'import org.junit.jupiter.api.Test;\nimport org.junit.jupiter.api.io.TempDir;\nimport org.objectweb.asm.ClassWriter;\nimport org.objectweb.asm.MethodVisitor;\nimport org.objectweb.asm.Opcodes;', 'test imports')
          s = once(s,
              '        assertFalse(json.contains(SYNTHETIC_LITERAL), json);',
              '        assertTrue(json.contains("\\\"sameClassCallsTruncated\\\":false"), json);\n        assertTrue(json.contains("\\\"constructorCallsTruncated\\\":false"), json);\n        assertTrue(json.contains("\\\"localsTruncated\\\":false"), json);\n        assertTrue(json.contains("\\\"stackTruncated\\\":false"), json);\n        assertFalse(json.contains(SYNTHETIC_LITERAL), json);', 'normal bound assertions')
          extra = '''\n    @Test\n    void structuralEdgesAndFrameValuesAreExplicitlyBounded() throws Exception {\n        byte[] bytes = oversizedStructuralClass();\n        ClassSignature signature = ClassSignature.parse(bytes);\n        Path output = temporaryDirectory.resolve("structural-bounds.json");\n        SoundLoaderContractReport report = new SoundLoaderContractReport(output);\n        report.observed(signature, source("/synthetic/fs.common_obf.jar", "example.Loader", "synthetic"), bytes);\n        report.write();\n        String json = Files.readString(output);\n        assertTrue(json.contains("\\\"sameClassCallLimitPerMethod\\\":" + SoundLoaderContractReport.CALL_LIMIT), json);\n        assertTrue(json.contains("\\\"constructorCallLimitPerMethod\\\":" + SoundLoaderContractReport.CALL_LIMIT), json);\n        assertTrue(json.contains("\\\"sameClassCallsTruncated\\\":true"), json);\n        assertTrue(json.contains("\\\"constructorCallsTruncated\\\":true"), json);\n        assertTrue(json.contains("\\\"localsTruncated\\\":true"), json);\n    }\n\n    private static byte[] oversizedStructuralClass() {\n        ClassWriter writer = new ClassWriter(0);\n        writer.visit(Opcodes.V17, Opcodes.ACC_PUBLIC, "sound/J", null, "java/lang/Object", null);\n        MethodVisitor method = writer.visitMethod(Opcodes.ACC_PUBLIC | Opcodes.ACC_STATIC, "oversized", "()V", null, null);\n        method.visitCode();\n        for (int index = 0; index < SoundLoaderContractReport.CALL_LIMIT + 5; index++) {\n            method.visitMethodInsn(Opcodes.INVOKESTATIC, "sound/J", "same" + index, "()V", false);\n            String owner = "example/Constructed" + index;\n            method.visitTypeInsn(Opcodes.NEW, owner);\n            method.visitInsn(Opcodes.DUP);\n            method.visitMethodInsn(Opcodes.INVOKESPECIAL, owner, "<init>", "()V", false);\n            method.visitInsn(Opcodes.POP);\n        }\n        for (int index = 0; index < SoundLoaderContractReport.FRAME_VALUE_LIMIT + 5; index++) {\n            method.visitInsn(Opcodes.ICONST_0);\n            method.visitVarInsn(Opcodes.ISTORE, index);\n        }\n        method.visitInsn(Opcodes.RETURN);\n        method.visitMaxs(2, SoundLoaderContractReport.FRAME_VALUE_LIMIT + 5);\n        method.visitEnd();\n        writer.visitEnd();\n        return writer.toByteArray();\n    }\n'''
          s = once(s, '\n    private static AdapterSourceIdentity source(String path, String loaderClass, String loaderName) {', extra + '\n    private static AdapterSourceIdentity source(String path, String loaderClass, String loaderName) {', 'large bound test')
          p.write_text(s)

          p = Path('preflight-cli/pom.xml')
          s = p.read_text()
          s = once(s,
              '              <createDependencyReducedPom>false</createDependencyReducedPom>\n              <transformers>',
              '              <createDependencyReducedPom>false</createDependencyReducedPom>\n              <relocations>\n                <relocation>\n                  <pattern>org.objectweb.asm</pattern>\n                  <shadedPattern>dev.starsector.preflight.internal.asm</shadedPattern>\n                </relocation>\n              </relocations>\n              <transformers>', 'ASM relocation')
          p.write_text(s)

          p = Path('preflight-cli/src/test/java/dev/starsector/preflight/cli/AdapterAgentIT.java')
          s = p.read_text()
          s = once(s, 'import java.util.concurrent.TimeUnit;\nimport org.junit.jupiter.api.Test;', 'import java.util.concurrent.TimeUnit;\nimport java.util.jar.JarFile;\nimport org.junit.jupiter.api.Test;', 'JarFile import')
          s = once(s,
              '        ProcessResult result = launch(agentArguments);',
              '        assertAsmIsRelocated();\n        ProcessResult result = launch(agentArguments);', 'relocation call')
          helper = '''\n    private static void assertAsmIsRelocated() throws Exception {\n        Path agent = Path.of("target", "preflight.jar").toAbsolutePath().normalize();\n        try (JarFile jar = new JarFile(agent.toFile())) {\n            assertTrue(jar.getEntry("dev/starsector/preflight/internal/asm/ClassReader.class") != null);\n            assertTrue(jar.getEntry("org/objectweb/asm/ClassReader.class") == null);\n        }\n    }\n'''
          s = once(s, '\n    private ProcessResult launch(String agentArguments) throws Exception {', helper + '\n    private ProcessResult launch(String agentArguments) throws Exception {', 'relocation helper')
          p.write_text(s)

          Path('.github/workflows/self-review-retry.yml').unlink()
          PY
      - name: Verify focused collector and packaged agent
        run: >-
          mvn --batch-mode --no-transfer-progress
          -pl preflight-agent,preflight-cli -am
          -Dtest=SoundLoaderContractReportTest,AudioDecoderSignatureReportTest,AgentOptionsTest,AgentInjectionTest,CommandLineAdapterTest
          -Dit.test=AdapterAgentIT
          -Dsurefire.failIfNoSpecifiedTests=false
          verify
      - name: Verify full reactor
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Commit review fixes
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: harden sound-contract bounds and ASM isolation'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
