name: Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  distribution:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java 17
        uses: ./.github/actions/setup-build-jdk

      - name: Verify and package
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Assemble distribution
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp preflight-cli/target/preflight.jar dist/preflight.jar
          (
            cd dist
            sha256sum preflight.jar > preflight.jar.sha256
          )
          cat > dist/README.txt <<'TEXT'
          Starsector Preflight
          ====================

          Requires Java 17 or newer.

          Discover and launch Starsector:
              java -jar preflight.jar run

          Check discovery without launching:
              java -jar preflight.jar doctor

          Install a convenient platform launcher:
              java -jar preflight.jar install

          Verify this download on macOS or Linux:
              shasum -a 256 -c preflight.jar.sha256

          Verify on Windows PowerShell:
              (Get-FileHash .\preflight.jar -Algorithm SHA256).Hash.ToLower()

          Project documentation:
              https://github.com/teamleaderleo/starsector-preflight
          TEXT
          tar -C dist -czf dist/starsector-preflight.tar.gz preflight.jar preflight.jar.sha256 README.txt
          (
            cd dist
            zip -q starsector-preflight.zip preflight.jar preflight.jar.sha256 README.txt
          )
          sha256sum dist/starsector-preflight.tar.gz dist/starsector-preflight.zip > dist/archives.sha256

      - name: Smoke-test packaged JAR
        shell: bash
        run: |
          set -euo pipefail
          java -jar dist/preflight.jar --help
          java -jar dist/preflight.jar doctor --game "$RUNNER_TEMP/does-not-exist" >/dev/null 2>&1 || test $? -eq 3

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: starsector-preflight-${{ github.ref_name }}
          path: |
            dist/preflight.jar
            dist/preflight.jar.sha256
            dist/starsector-preflight.tar.gz
            dist/starsector-preflight.zip
            dist/archives.sha256
            dist/README.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            dist/preflight.jar \
            dist/preflight.jar.sha256 \
            dist/starsector-preflight.tar.gz \
            dist/starsector-preflight.zip \
            dist/archives.sha256 \
            dist/README.txt \
            --verify-tag \
            --generate-notes \
            --title "Starsector Preflight $GITHUB_REF_NAME"
