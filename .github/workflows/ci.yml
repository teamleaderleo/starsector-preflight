name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  schedule:
    - cron: '23 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest","macos-latest","windows-latest"]' || '["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: ./.github/actions/setup-build-jdk
      - name: Validate operator runners
        if: runner.os != 'Windows'
        run: |
          bash -n scripts/run-prepared-pixel-coherent-direct-gameplay-smoke.sh
          bash -n scripts/run-prepared-pixel-main-menu-comparison-pilot.sh
          python3 -m py_compile scripts/starsector_log_ready_detector.py
          python3 scripts/test_starsector_log_ready_detector.py
          python3 -m py_compile scripts/starsector_profile_guard.py
          python3 scripts/test_starsector_profile_guard.py
          python3 -m py_compile scripts/starsector_core_resource_guard.py
          python3 scripts/test_starsector_core_resource_guard.py
          python3 -m py_compile scripts/test_prepared_comparison_pilot.py
          python3 scripts/test_prepared_comparison_pilot.py
      - name: Verify
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Upload runnable JAR
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: starsector-preflight
          path: preflight-cli/target/preflight.jar
          if-no-files-found: error
