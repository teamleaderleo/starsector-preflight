name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  schedule:
    - cron: '23 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest","macos-latest","windows-latest"]' || '["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-build-jdk
      - name: Validate operator runners
        if: runner.os != 'Windows'
        run: |
          bash -n scripts/run-prepared-pixel-coherent-direct-gameplay-smoke.sh
          bash -n scripts/run-prepared-pixel-main-menu-comparison-pilot.sh
      - name: Verify
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Upload runnable JAR
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: starsector-preflight
          path: preflight-cli/target/preflight.jar
          if-no-files-found: error
