name: Classpath audit tests

on:
  pull_request:
    paths:
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/ClasspathAudit.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/ClasspathCommand.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/JsonObjectArrays.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/PreflightCli.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/ClasspathAuditTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/ClasspathCommandTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/JsonObjectArraysTest.java'
      - '.github/workflows/classpath-audit-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run focused tests
        shell: bash
        run: |
          set +e
          mvn -B -ntp -pl preflight-cli -am test \
            -Dtest=ClasspathAuditTest,ClasspathCommandTest,JsonObjectArraysTest \
            -Dsurefire.failIfNoSpecifiedTests=false
          status=$?
          if [ "$status" -ne 0 ]; then
            find . -path '*/target/surefire-reports/*.txt' -type f -print -exec cat {} \;
          fi
          exit "$status"
