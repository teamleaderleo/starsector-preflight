name: Generated bytecode wrapper tests

on:
  push:
    branches: [main]
    paths:
      - 'preflight-core/src/main/java/dev/starsector/preflight/core/GeneratedBytecode*.java'
      - 'preflight-core/src/test/java/dev/starsector/preflight/core/GeneratedBytecode*.java'
      - 'preflight-synthetic-startup/src/main/java/dev/starsector/preflight/synthetic/SyntheticGeneratedBytecode*.java'
      - 'preflight-synthetic-startup/src/test/java/dev/starsector/preflight/synthetic/SyntheticGeneratedBytecode*.java'
      - 'docs/generated-bytecode-cache.md'
      - 'preflight-core/pom.xml'
      - 'preflight-synthetic-startup/pom.xml'
      - 'pom.xml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'preflight-core/src/main/java/dev/starsector/preflight/core/GeneratedBytecode*.java'
      - 'preflight-core/src/test/java/dev/starsector/preflight/core/GeneratedBytecode*.java'
      - 'preflight-synthetic-startup/src/main/java/dev/starsector/preflight/synthetic/SyntheticGeneratedBytecode*.java'
      - 'preflight-synthetic-startup/src/test/java/dev/starsector/preflight/synthetic/SyntheticGeneratedBytecode*.java'
      - 'docs/generated-bytecode-cache.md'
      - 'preflight-core/pom.xml'
      - 'preflight-synthetic-startup/pom.xml'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  focused:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-build-jdk
      - name: Run generated-bytecode wrapper tests
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            -pl preflight-core,preflight-synthetic-startup -am \
            -Dtest=GeneratedBytecodeContextEvidenceTest,GeneratedBytecodeCacheWrapperTest,GeneratedBytecodeCacheSafetyTest,SyntheticGeneratedBytecodeCrossProcessTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test > generated-bytecode-wrapper-maven.log 2>&1
          status=$?
          cat generated-bytecode-wrapper-maven.log
          exit $status
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-bytecode-wrapper-${{ matrix.os }}
          path: generated-bytecode-wrapper-maven.log
          if-no-files-found: error
          retention-days: 7
