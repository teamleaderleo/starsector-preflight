name: Apply unified probe hardening

on:
  push:
    branches: [feature/unified-startup-probe-v1]
    paths:
      - '.github/workflows/apply-unified-probe-hardening.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/unified-startup-probe-v1
          fetch-depth: 0
      - name: Harden texture contract report
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('preflight-agent/src/main/java/dev/starsector/preflight/agent/BytecodeShapeReport.java')
          text = path.read_text()

          replacements = [
              (
                  '        root.put("automaticRewriteGenerated", false);\n'
                  '        root.put("requiresHumanReview", true);\n'
                  '        root.put("classBytesIncluded", false);\n'
                  '        root.put("stringConstantsIncluded", false);',
                  '        root.put("automaticRewriteGenerated", false);\n'
                  '        root.put("originalClassBytesRetained", true);\n'
                  '        root.put("classBytesIncluded", false);\n'
                  '        root.put("bytecodeListingsIncluded", false);\n'
                  '        root.put("stringConstantsIncluded", false);\n'
                  '        root.put("transformationPlanGenerated", false);\n'
                  '        root.put("transformRegistered", false);\n'
                  '        root.put("cacheReadsEnabled", false);\n'
                  '        root.put("cacheWritesEnabled", false);\n'
                  '        root.put("requiresHumanReview", true);\n'
                  '        root.put("methodLimit", METHOD_LIMIT);\n'
                  '        root.put("fieldLimitPerMethod", FIELD_LIMIT);\n'
                  '        root.put("callLimitPerMethod", CALL_LIMIT);\n'
                  '        root.put("constantLimitPerMethod", CONSTANT_LIMIT);\n'
                  '        root.put("flowPointLimitPerMethod", FLOW_POINT_LIMIT);\n'
                  '        root.put("frameValueLimit", FRAME_VALUE_LIMIT);'
              ),
              (
                  '                source.sourceKind(),\n'
                  '                source.loaderClass(),',
                  '                source.sourceKind(),\n'
                  '                source.sourceSha256(),\n'
                  '                source.sourceHashProblem(),\n'
                  '                source.loaderClass(),'
              ),
              (
                  '        boolean callsTruncated = false;\n'
                  '        boolean constantsTruncated = false;',
                  '        boolean callsTruncated = false;\n'
                  '        boolean internalCallsTruncated = false;\n'
                  '        boolean constantsTruncated = false;'
              ),
              (
                  '                if (owner.equals(call.owner)) {\n'
                  '                    internalCalls.putIfAbsent(key, edge);\n'
                  '                }',
                  '                if (owner.equals(call.owner)) {\n'
                  '                    if (internalCalls.size() < CALL_LIMIT) {\n'
                  '                        internalCalls.putIfAbsent(key, edge);\n'
                  '                    } else if (!internalCalls.containsKey(key)) {\n'
                  '                        internalCallsTruncated = true;\n'
                  '                    }\n'
                  '                }'
              ),
              (
                  '                fieldsTruncated,\n'
                  '                callsTruncated,\n'
                  '                constantsTruncated,',
                  '                fieldsTruncated,\n'
                  '                callsTruncated,\n'
                  '                internalCallsTruncated,\n'
                  '                constantsTruncated,'
              ),
              (
                  '            String sourceKind,\n'
                  '            String loaderClass,',
                  '            String sourceKind,\n'
                  '            String sourceSha256,\n'
                  '            String sourceHashProblem,\n'
                  '            String loaderClass,'
              ),
              (
                  '            values.put("sourceKind", sourceKind);\n'
                  '            values.put("loaderClass", loaderClass);',
                  '            values.put("sourceKind", sourceKind);\n'
                  '            values.put("sourceSha256", sourceSha256.isBlank() ? null : sourceSha256);\n'
                  '            values.put("sourceHashProblem", sourceHashProblem.isBlank() ? null : sourceHashProblem);\n'
                  '            values.put("loaderClass", loaderClass);'
              ),
              (
                  '            boolean fieldAccessesTruncated,\n'
                  '            boolean callsTruncated,\n'
                  '            boolean constantsTruncated,',
                  '            boolean fieldAccessesTruncated,\n'
                  '            boolean callsTruncated,\n'
                  '            boolean internalCallsTruncated,\n'
                  '            boolean constantsTruncated,'
              ),
              (
                  '            values.put("fieldAccessesTruncated", fieldAccessesTruncated);\n'
                  '            values.put("callsTruncated", callsTruncated);\n'
                  '            values.put("constantsTruncated", constantsTruncated);',
                  '            values.put("fieldAccessesTruncated", fieldAccessesTruncated);\n'
                  '            values.put("callsTruncated", callsTruncated);\n'
                  '            values.put("internalCallsTruncated", internalCallsTruncated);\n'
                  '            values.put("constantsTruncated", constantsTruncated);'
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one replacement, found {count}: {old[:80]!r}')
              text = text.replace(old, new)

          path.write_text(text)
          PY
      - name: Commit hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add preflight-agent/src/main/java/dev/starsector/preflight/agent/BytecodeShapeReport.java
          git commit -m "M8: harden texture contract bounds and archive identity"
          git push origin HEAD:feature/unified-startup-probe-v1
