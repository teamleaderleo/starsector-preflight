name: Audio codec fixture tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run Ogg/Vorbis golden fixture tests
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            -pl preflight-core -am \
            -Dtest=OggVorbisGoldenFixtureTest \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test > audio-codec-fixtures-maven.log 2>&1
          status=$?
          cat audio-codec-fixtures-maven.log
          exit $status
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-codec-fixtures-${{ matrix.os }}
          path: audio-codec-fixtures-maven.log
          if-no-files-found: error
