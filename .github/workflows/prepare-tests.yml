name: Prepare command tests

on:
  pull_request:
    paths:
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/PrepareCommand.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/PreflightCli.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/PrepareCommandTest.java'
      - '.github/workflows/prepare-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: ./.github/actions/setup-build-jdk
      - name: Run prepare tests
        shell: bash
        run: |
          set +e
          mvn -q -pl preflight-cli -am test \
            -Dtest=PrepareCommandTest \
            -Dsurefire.failIfNoSpecifiedTests=false > prepare-maven.log 2>&1
          status=$?
          find . -path '*/target/surefire-reports/*.txt' -type f -print -exec cat {} \; >> prepare-maven.log
          tail -n 200 prepare-maven.log
          exit "$status"
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: prepare-${{ matrix.os }}
          path: |
            prepare-maven.log
            **/target/surefire-reports/*
          if-no-files-found: warn
          retention-days: 7
