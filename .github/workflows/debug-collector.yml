name: Collector diagnostics

on:
  push:
    branches: [feature/benchmark-run-collector-current]

permissions:
  contents: read

jobs:
  verify-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: ./.github/actions/setup-build-jdk
      - name: Capture quiet verification log
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress --quiet verify > collector-maven.log 2>&1
          status=$?
          tail -n 200 collector-maven.log
          exit "$status"
      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: collector-maven-log
          path: collector-maven.log
          if-no-files-found: error
