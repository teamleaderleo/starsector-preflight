name: Apply prepared-pixel repair patch

on:
  push:
    branches:
      - repair/prepared-pixel-lifecycle-129-130-128

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch and commit source changes
        shell: bash
        run: |
          set -euo pipefail
          patch=.github/patches/prepared-pixel-repair.patch
          git apply --check "$patch"
          git apply "$patch"
          rm "$patch" .github/workflows/apply-prepared-pixel-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Repair prepared-pixel NPOT admission and exceptional release"
          git push
