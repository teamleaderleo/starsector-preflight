name: Run self-review script

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply review edits
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_sound_contract_review_fixes.py')
          text = path.read_text()
          old = """    method_record = idx(lines, '    private record MethodStructure(')\n    method_json = idx(lines, '        Map<String, Object> toMap() {', method_record)"""
          new = """    method_record = idx(lines, '    private record MethodStructure(')\n    method_end = idx(lines, '    private record FieldAccess(', method_record)\n    method_json = idx(lines, '        Map<String, Object> toMap() {', method_record, method_end)"""
          if text.count(old) != 1:
              raise SystemExit('MethodStructure search anchor changed')
          text = text.replace(old, new, 1)
          old = """    flow_record = idx(lines, '    private record FlowPoint(')\n    flow_json = idx(lines, '        Map<String, Object> toMap() {', flow_record)"""
          new = """    flow_record = idx(lines, '    private record FlowPoint(')\n    flow_end = idx(lines, '    private record StructuralAnalysis(', flow_record)\n    flow_json = idx(lines, '        Map<String, Object> toMap() {', flow_record, flow_end)"""
          if text.count(old) != 1:
              raise SystemExit('FlowPoint search anchor changed')
          path.write_text(text.replace(old, new, 1))
          PY
          python3 tools/apply_sound_contract_review_fixes.py
          git diff --check
      - name: Verify focused collector and packaged agent
        run: >-
          mvn --batch-mode --no-transfer-progress
          -pl preflight-agent,preflight-cli -am
          -Dtest=SoundLoaderContractReportTest,AudioDecoderSignatureReportTest,AgentOptionsTest,AgentInjectionTest,CommandLineAdapterTest
          -Dit.test=AdapterAgentIT
          -Dsurefire.failIfNoSpecifiedTests=false
          verify
      - name: Verify full reactor
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Commit review fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: harden sound-contract bounds and ASM isolation'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
