name: Vanilla adapter gate tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'preflight-agent/**'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/AgentInjection.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/CommandLine.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/CurrentTextureCache.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/RunCommand.java'
      - 'preflight-cli/src/test/java/com/fs/graphics/**'
      - 'preflight-cli/src/test/java/com/fs/starfarer/SyntheticLauncher.java'
      - 'preflight-cli/src/test/java/com/fs/starfarer/SyntheticTextureLauncher.java'
      - 'preflight-cli/src/test/java/com/fs/starfarer/loading/A.java'
      - 'preflight-cli/src/test/java/com/jcraft/jorbis/**'
      - 'preflight-cli/src/test/java/sound/**'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/*Adapter*.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/*Texture*.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/AgentInjectionTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/RunCommandIT.java'
      - 'preflight-cli/src/test/java/org/newdawn/slick/openal/OggDecoder.java'
      - 'preflight-cli/pom.xml'
      - 'pom.xml'
  push:
    branches: [main]
    paths:
      - 'preflight-agent/**'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/AgentInjection.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/CommandLine.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/CurrentTextureCache.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/RunCommand.java'
      - 'preflight-cli/src/test/java/com/fs/graphics/**'
      - 'preflight-cli/src/test/java/com/fs/starfarer/SyntheticLauncher.java'
      - 'preflight-cli/src/test/java/com/fs/starfarer/SyntheticTextureLauncher.java'
      - 'preflight-cli/src/test/java/com/fs/starfarer/loading/A.java'
      - 'preflight-cli/src/test/java/com/jcraft/jorbis/**'
      - 'preflight-cli/src/test/java/sound/**'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/*Adapter*.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/*Texture*.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/AgentInjectionTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/RunCommandIT.java'
      - 'preflight-cli/src/test/java/org/newdawn/slick/openal/OggDecoder.java'
      - 'preflight-cli/pom.xml'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  focused:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: ./.github/actions/setup-build-jdk
      - name: Run adapter signature, source, texture, decoder, sound-contract, code-loader, ranking, and packaged-agent tests
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            -pl preflight-agent,preflight-cli -am \
            -Dtest=AdapterSignatureGateTest,AdapterSourceIdentityTest,BytecodeShapeReportTest,TextureCompatibilityRuntimeTest,TextureCompatibilityPlanTest,TexturePreparedPixelRuntimeTest,TexturePreparedPixelPlanTest,TextureCompatibilityTargetTest,AudioDecoderSignatureReportTest,SoundLoaderContractReportTest,CodeLoaderSignatureReportTest,AdapterCandidateScorerTest,AgentOptionsTest,AgentInjectionTest,CommandLineAdapterTest,CurrentTextureCacheTest,StarsectorRunLogEvidenceTest \
            -Dit.test=AdapterAgentIT,TextureCompatibilityAgentIT,TexturePreparedPixelAgentIT,RunCommandIT \
            -Dsurefire.failIfNoSpecifiedTests=false \
            verify > adapter-gate-maven.log 2>&1
          status=$?
          find . -path '*/target/surefire-reports/*.txt' -type f -print -exec cat {} \; >> adapter-gate-maven.log
          find . -path '*/target/failsafe-reports/*.txt' -type f -print -exec cat {} \; >> adapter-gate-maven.log
          tail -n 340 adapter-gate-maven.log
          exit "$status"
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: adapter-gate-${{ matrix.os }}
          path: |
            adapter-gate-maven.log
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: warn
          retention-days: 7
