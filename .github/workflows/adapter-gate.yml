name: Vanilla adapter gate tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run adapter signature, source, ranking, and packaged-agent tests
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress \
            -pl preflight-agent,preflight-cli -am \
            -Dtest=AdapterSignatureGateTest,AdapterSourceIdentityTest,AdapterCandidateScorerTest,AgentOptionsTest,AgentInjectionTest,CommandLineAdapterTest \
            -Dit.test=AdapterAgentIT \
            -Dsurefire.failIfNoSpecifiedTests=false \
            verify > adapter-gate-maven.log 2>&1
          status=$?
          find . -path '*/target/surefire-reports/*.txt' -type f -print -exec cat {} \; >> adapter-gate-maven.log
          find . -path '*/target/failsafe-reports/*.txt' -type f -print -exec cat {} \; >> adapter-gate-maven.log
          tail -n 260 adapter-gate-maven.log
          exit "$status"
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adapter-gate-${{ matrix.os }}
          path: |
            adapter-gate-maven.log
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: warn
          retention-days: 7
