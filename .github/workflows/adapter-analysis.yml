name: Adapter probe analysis tests

on:
  pull_request:
    paths:
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/StrictJson.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/AdapterProbeAnalysis.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/AnalysisCommand.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/PreflightCli.java'
      - 'preflight-cli/src/main/java/dev/starsector/preflight/cli/RunCommand.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/StrictJsonTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/AdapterProbeAnalysisTest.java'
      - 'preflight-cli/src/test/java/dev/starsector/preflight/cli/AnalysisCommandTest.java'
      - '.github/workflows/adapter-analysis.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-jdk
      - name: Run strict parser and adapter analysis tests
        shell: bash
        run: >-
          mvn --batch-mode --no-transfer-progress
          -pl preflight-cli -am
          -Dtest=StrictJsonTest,AdapterProbeAnalysisTest,AnalysisCommandTest
          -Dsurefire.failIfNoSpecifiedTests=false
          test
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adapter-analysis-${{ matrix.os }}
          path: '**/target/surefire-reports/**'
          if-no-files-found: ignore
